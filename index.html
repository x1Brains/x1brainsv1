<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080c0f" />
    <title>X1 BRAINS · v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Orbitron:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!-- Critical inline CSS — parsed before any stylesheet/JS fetch so the dark
         theme paints on the very first frame. Without this the browser shows a
         white page + unstyled DOM (FOUC) on slow mobile loads until the bundled
         CSS (imported in main.tsx) arrives. -->
    <style>
      html, body { margin: 0; background: #080c0f; color: #e6edf6; }
      #root { min-height: 100vh; }
      /* Pre-mount splash — sits OUTSIDE #root (sibling) so React mounting #root
         can't wipe it. It stays on top covering the app until main.tsx removes
         it on the first STYLED frame (after the useEffect-injected page CSS has
         landed), so the unstyled first paint is never visible. */
      #boot {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #080c0f;
        transition: opacity .25s ease;
      }
      #boot.hide { opacity: 0; pointer-events: none; }
      #boot .x1 {
        font-family: 'Orbitron', system-ui, sans-serif;
        font-weight: 900; font-size: 26px; letter-spacing: 4px;
        color: #f29030;
        animation: bootpulse 1.1s ease-in-out infinite;
      }
      @keyframes bootpulse { 0%, 100% { opacity: .35; } 50% { opacity: .95; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot"><div class="x1">X1 BRAINS</div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
