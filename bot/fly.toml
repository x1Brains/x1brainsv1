# fly.toml app configuration file for x1brains-bot
# Pure poller — no HTTP server, so no [[services]] block.
# Without [[services]], Fly skips port health checks and the machine
# stays running indefinitely as long as the Python process is alive.

app = 'x1brains-bot'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PYTHONUNBUFFERED = '1'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
